name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04          # x86_64
            arch: x86_64
          - os: ubuntu-24.04-arm      # arm64 (GitHub native ARM runner)
            arch: arm64
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install OpenMP (Linux)
        run: sudo apt-get install -y libomp-dev

      - name: Build and install
        run: pip install ".[test]" -v
        env:
          CMAKE_ARGS: "-DCMAKE_C_FLAGS=-fopenmp -DCMAKE_CXX_FLAGS=-fopenmp"

      - name: Run Python tests
        run: pytest python/tests/ -v

      - name: Build and run C++ tests
        run: |
          cmake -B build -DFHT_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
          ctest --test-dir build --output-on-failure
